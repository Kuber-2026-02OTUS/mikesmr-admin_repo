apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-networks
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: otus
  source:
    repoURL: git@github.com:Kuber-2026-02OTUS/mikesmr-admin_repo.git
    targetRevision: kubernetes-gitops   # <-- ваша рабочая ветка
    path: kubernetes-networks
  destination:
    server: https://kubernetes.default.svc
    namespace: homework
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # manual sync – отсутствует секция automated