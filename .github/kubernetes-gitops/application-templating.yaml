apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-templating
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: otus
  source:
    repoURL: git@github.com:Kuber-2026-02OTUS/mikesmr-admin_repo.git
    targetRevision: kubernetes-gitops   # <-- ваша рабочая ветка
    path: kubernetes-templating/web-server
    helm:
      values: |
        replicaCount: 3   # переопределяем количество реплик
  destination:
    server: https://kubernetes.default.svc
    namespace: HomeworkHelm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m