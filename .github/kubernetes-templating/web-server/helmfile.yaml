releases:
  - name: kafka-prod
    namespace: prod
    createNamespace: true
    chart: oci://registry-1.docker.io/bitnamicharts/kafka
    version: 27.0.0                # версия Helm-чарта (проверьте актуальность)
    values:
      - replicaCount: 5
        controller:
          replicaCount: 5                # чтобы каждый брокер был контроллером в KRaft
        image:
          tag: 3.5.2-debian-12-r0        # фиксированный тег для стабильности
        listeners:
          client:
            protocol: SASL_PLAINTEXT
          interbroker:
            protocol: SASL_PLAINTEXT
        sasl:
          enabled: true
          mechanisms: scram-sha-512
          client:
            users:
              - admin
            passwords:
              - admin123            # ⚠️ в реальности используйте секреты
          interbroker:
            user: interbroker
            password: interpass     # ⚠️ в реальности используйте секреты
        authorization:
          enabled: false
        persistence:
          enabled: true
          size: 10Gi
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        rbac:
          create: false

  - name: kafka-dev
    namespace: dev
    createNamespace: true
    chart: oci://registry-1.docker.io/bitnamicharts/kafka
    version: 27.0.0                # та же версия чарта, но образ Kafka будет последний стабильный
    values:
      - replicaCount: 1
        controller:
          replicaCount: 1                # один узел-контроллер и брокер
        image:
          tag: 3.5.2-debian-12-r0        # явный тег для гарантии
        listeners:
          client:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
        sasl:
          enabled: false
        authorization:
          enabled: false
        persistence:
          enabled: false
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        rbac:
          create: false