releases:
  - name: kafka-prod
    namespace: prod
    createNamespace: true
    chart: oci://registry-1.docker.io/bitnamicharts/kafka
    version: 27.0.0
    values:
      - replicaCount: 5
        controller:
          replicaCount: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        image:
          tag: 3.5.2-debian-12-r6
        listeners:
          client:
            protocol: SASL_PLAINTEXT
          interbroker:
            protocol: SASL_PLAINTEXT
        sasl:
          enabled: true
          mechanisms: scram-sha-512
          client:
            users: [admin]
            passwords: [admin123]
          interbroker:
            user: interbroker
            password: interpass
        authorization:
          enabled: false
        persistence:
          enabled: true
          size: 10Gi
        volumePermissions:
          enabled: false
        rbac:
          create: false
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

  - name: kafka-dev
    namespace: dev
    createNamespace: true
    chart: oci://registry-1.docker.io/bitnamicharts/kafka
    version: 27.0.0
    values:
      - replicaCount: 1
        controller:
          replicaCount: 1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
        image:
          tag: 3.7.0-debian-12-r3
        listeners:
          client:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
        sasl:
          enabled: false
        authorization:
          enabled: false
        persistence:
          enabled: false
        volumePermissions:
          enabled: false
        rbac:
          create: false
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"