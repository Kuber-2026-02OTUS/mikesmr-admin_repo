deploymentMode: SingleBinary

loki:
  auth_enabled: false
  image:
    repository: crpcdfo4fubpcdm8nbqq/loki
    tag: 2.9.2
    pullPolicy: IfNotPresent
  storage:
    type: s3
    bucketNames:
      chunks: my-logs-bucket-20260404
      ruler: my-logs-bucket-20260404
    s3:
      endpoint: storage.yandexcloud.net
      region: ru-central-1-a
      accessKeyId: " "
      secretAccessKey: ""
      s3ForcePathStyle: false
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storageConfig:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache
      shared_store: s3

singleBinary:
  replicas: 1
  persistence:
    enabled: false

gateway:
  enabled: false

sidecar:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: false

tableManager:
  enabled: false

rollout_operator:
  enabled: false

minio:
  enabled: false

ruler:
  enabled: false

enterprise:
  enabled: false

bloomGateway:
  enabled: false

bloomPlanner:
  enabled: false

bloomBuilder:
  enabled: false

indexGateway:
  replicas: 0

patternIngester:
  enabled: false

overridesExporter:
  enabled: false

serviceAccount:
  create: true
  name: loki

imagePullSecrets:
  - name: regcred

tolerations:
  - key: "node-role"
    operator: "Equal"
    value: "infra"
    effect: "NoSchedule"

nodeSelector:
  node-role: infra