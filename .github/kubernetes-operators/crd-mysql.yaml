# crd-mysql.yaml
# CustomResourceDefinition для ресурса MySQL в группе otus.homework
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqls.otus.homework  # имя CRD = plural.group
spec:
  group: otus.homework          # API-группа
  scope: Namespaced             # ресурс существует в пространстве имён
  names:
    kind: MySQL                 # вид ресурса в YAML
    plural: mysqls              # множественное имя для kubectl
    singular: mysql             # единственное имя
    shortNames: []              # короткие имена (не обязательны)
  versions:
  - name: v1                    # версия API
    served: true                # версия доступна
    storage: true               # версия сохраняется в etcd
    schema:                     # схема валидации OpenAPI v3
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:           # обязательные поля в spec
            - image
            - database
            - password
            - storage_size
            properties:
              image:
                type: string
              database:
                type: string
              password:
                type: string
              storage_size:
                type: string
        required:
        - spec