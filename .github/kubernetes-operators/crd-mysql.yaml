# crd-mysql.yaml
# Определение кастомного ресурса MySQL в группе otus.homework
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqls.otus.homework          # имя CRD = plural + group
spec:
  group: otus.homework                # API-группа
  scope: Namespaced                   # ресурс может быть создан в любом namespace
  names:
    kind: MySQL                       # тип ресурса в YAML
    plural: mysqls                    # множественное имя для kubectl
    singular: mysql                   # единственное имя
  versions:
  - name: v1                          # версия API
    served: true                      # версия доступна
    storage: true                     # сохраняется в etcd
    schema:                           # OpenAPI v3 схема валидации
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:                 # обязательные поля в spec
            - image
            - database
            - password
            - storage_size
            properties:
              image:
                type: string
              database:
                type: string
              password:
                type: string
              storage_size:
                type: string
        required:
        - spec