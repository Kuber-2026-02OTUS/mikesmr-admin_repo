# rbac.yaml
# Сервисный аккаунт для оператора
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator
  namespace: homework          # можно указать своё пространство
---
# ClusterRole с полными правами на все ресурсы API
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator-full-access
rules:
- apiGroups: ["*"]            # все группы
  resources: ["*"]            # все ресурсы
  verbs: ["*"]                # все действия
---
# Привязка ClusterRole к ServiceAccount в пространстве homework
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mysql-operator-full-access
subjects:
- kind: ServiceAccount
  name: mysql-operator
  namespace: homework