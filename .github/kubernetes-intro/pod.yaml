apiVersion: v1
kind: Pod
metadata:
  name: web-server
  namespace: homework
spec:
  volumes:
  - name: shared-volume
    emptyDir: {}
  
  initContainers:
  - name: init-downloader
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      wget -O /init/index.html https://example.com 2>/dev/null || echo "<html><body><h1>Hello from homework</h1></body></html>" > /init/index.html
      echo "File created successfully"
      ls -la /init/
    volumeMounts:
    - name: shared-volume
      mountPath: /init
  
  containers:
  - name: web-server
    image: nginx:alpine
    volumeMounts:
    - name: shared-volume
      mountPath: /homework
    lifecycle:
      preStop:
        exec:
          command:
          - sh
          - -c
          - rm -f /homework/index.html
    ports:
    - containerPort: 8000
      protocol: TCP
  
  restartPolicy: Never