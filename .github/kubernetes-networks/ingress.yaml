apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-server-ingress
  namespace: homework
  annotations:
    # Аннотация для NGINX Ingress Controller, которая включает перезапись целевого пути
    # Без этой аннотации запрос /homepage будет передан в сервис как /homepage
    # С ней — путь будет изменён согласно capture groups из rewrite-target
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx  # Указывает использовать установленный NGINX Ingress Controller
  rules:
  - host: homework.otus  # Правило применяется только для этого домена
    http:
      paths:
      # Первое правило: обрабатывает запросы к /homepage и перенаправляет их на /index.html
      - path: /homepage(/|$)(.*)  # Регулярное выражение: захватывает всё после /homepage/
        # /homepage          -> $2 = "" (пустая строка)
        # /homepage/         -> $2 = "" 
        # /homepage/test     -> $2 = "test"
        # После rewrite-target: / + $2 -> фактически путь будет / (или /test)
        pathType: ImplementationSpecific
        backend:
          service:
            name: web-server-service  # Имя сервиса из service.yaml
            port:
              number: 80  # Порт сервиса
      
      # Второе правило: все остальные запросы (например, /index.html) идут напрямую
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: web-server-service
            port:
              number: 80